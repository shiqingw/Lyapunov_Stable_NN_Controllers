defaults:
  - user: example3d_state_training_default
  - train_template

hydra:
  run:
    dir: ${user.run_dir}
  sweep:
    dir: ${user.run_dir}

wandb_name: example3d

approximate_lqr: True

pgd_verifier_steps: 300

model:
  lyapunov:
    quadratic: True
    hidden_widths: [16, 16, 8]
  load_lyaloss: ${user.load_lyaloss}
  kappa: 0.01
  V_decrease_within_roa: True
  limit_scale: [0.25, 0.5, 0.75, 1.0]
  V_psd_form: "L1"
  rho_multiplier: [2.0, 2.0, 1.5, 1.5]
  # State-space half-widths: box is x in [-limit, limit] -> [-5,5]^3 here.
  limit: [5, 5, 5]
  controller_nlayer: 4
  controller_hidden_dim: 8
  # Control input bounds for the clamped neural network controller.
  u_lo: [-20.0]
  u_up: [20.0]
  integration: "ExplicitEuler"
  dt: 0.05

train:
  train_lyaloss: True
  Vmin_x_pgd_path: ${user.Vmin_x_pgd_path}
  hard_max: True
  num_samples_per_boundary: 1024
  batch_size: 1024
  epochs: 50
  pgd_steps: 150
  Vmin_x_pgd_buffer_size: 65536
  buffer_size: 65536
  samples_per_iter: 8192
  max_iter: 10
  derivative_x_buffer_path: ${user.derivative_x_buffer_path}

loss:
  candidate_scale: 1.
  candidate_roa_states_weight: 0.0001
  l1_reg: 0
  # Candidate ROA states must lie inside the box [-limit, limit] = [-5,5]^3.
  candidate_roa_states:
    - [3.75, 3.75, 3.75]
    - [-3.75, 3.75, -3.75]
    - [3.75, -3.75, 3.75]
    - [-3.75, -3.75, -3.75]
    - [0.0, 3.75, 0.0]
    - [3.75, 0.0, -3.75]
  always_candidate_roa_regulizer: True
